name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 仅授予 Pages 部署所需的最小权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一次部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # 见 ci.yml 的同名步骤注释:用 npm install 绕开 Windows 生成的
        # lockfile 在 Linux 上 npm ci 触发 EBADPLATFORM 的问题。
        run: npm install --no-audit --no-fund

      - name: Build
        # GitHub Pages 项目站点路径形如 https://<user>.github.io/<repo>/
        # 通过 VITE_BASE 让 Vite 输出正确的静态资源路径
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
