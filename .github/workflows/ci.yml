name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # 使用 npm install 而非 npm ci:
        # 在 Windows 上由 npm 11 生成的 lockfile 会把 esbuild 的平台可选包
        # (如 @esbuild/netbsd-arm64) 错标成必装,导致 Linux 上 npm ci 报 EBADPLATFORM。
        # npm install 走 lockfile 但宽容跳过平台不匹配的可选包,功能等价、更稳。
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
